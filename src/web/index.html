<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Taurus</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #c9d1d9; --text2: #8b949e;
    --accent: #58a6ff; --green: #3fb950; --red: #f85149;
    --yellow: #d29922; --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); font-size: 14px; }

  /* Layout */
  .app { display: flex; height: 100vh; }
  .sidebar { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg2); }
  .main { flex: 1; display: flex; flex-direction: column; }

  /* Sidebar */
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-header h1 { font-size: 16px; font-weight: 600; }
  .thread-list { flex: 1; overflow-y: auto; }
  .thread-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .1s; }
  .thread-item:hover { background: var(--bg3); }
  .thread-item.active { background: var(--bg3); border-left: 2px solid var(--accent); }
  .thread-item .name { font-weight: 500; margin-bottom: 2px; }
  .thread-item .meta { font-size: 12px; color: var(--text2); }

  /* Status badges */
  .status { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .status.idle { background: var(--bg3); color: var(--text2); }
  .status.running { background: #0d419d; color: var(--accent); }
  .status.paused { background: #4d2d00; color: var(--yellow); }
  .status.error { background: #490202; color: var(--red); }
  .status.disabled { background: var(--bg3); color: var(--text2); opacity: 0.5; }

  /* Main panel */
  .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg2); }
  .panel-header h2 { font-size: 15px; font-weight: 500; }
  .panel-actions { display: flex; gap: 8px; }

  /* Buttons */
  .btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 12px; font-family: inherit; }
  .btn:hover { border-color: var(--text2); }
  .btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn.primary:hover { background: #2ea043; }
  .btn.danger { background: #da3633; border-color: #f85149; color: #fff; }
  .btn.danger:hover { background: #f85149; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Log area */
  .log-area { flex: 1; overflow-y: auto; padding: 8px 0; font-size: 13px; line-height: 1.5; }
  .log-entry { padding: 2px 16px; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; }
  .log-entry:hover { background: var(--bg2); }
  .log-entry .ts { color: var(--text2); margin-right: 8px; }
  .log-entry .ev { color: var(--purple); margin-right: 8px; min-width: 120px; display: inline-block; }
  .log-entry.warn { color: var(--yellow); }
  .log-entry.error { color: var(--red); }
  .log-entry.debug { color: var(--text2); }

  /* Live streaming text */
  .llm-stream { padding: 6px 16px; color: var(--text); white-space: pre-wrap; word-break: break-word; border-left: 2px solid var(--accent); margin: 4px 16px; background: var(--bg2); border-radius: 0 4px 4px 0; font-family: -apple-system, sans-serif; font-size: 13px; line-height: 1.5; }

  /* Input bar */
  .input-bar { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--bg2); }
  .input-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
  .input-bar input:focus { border-color: var(--accent); }

  /* Empty state */
  .empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text2); font-size: 14px; }

  /* Create thread modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: 480px; max-height: 80vh; overflow-y: auto; }
  .modal h3 { margin-bottom: 16px; font-size: 16px; }
  .modal label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--text2); }
  .modal input, .modal textarea, .modal select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-family: inherit; font-size: 13px; margin-bottom: 12px; outline: none; }
  .modal textarea { min-height: 80px; resize: vertical; }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Taurus</h1>
      <button class="btn primary" onclick="showCreateModal()">+ New</button>
    </div>
    <div class="thread-list" id="threadList"></div>
  </div>

  <div class="main">
    <div id="emptyState" class="empty">Select or create a thread</div>
    <div id="threadPanel" class="hidden" style="display:flex;flex-direction:column;flex:1;">
      <div class="panel-header">
        <div>
          <h2 id="panelTitle"></h2>
          <span id="panelStatus" class="status"></span>
          <span id="panelMeta" style="font-size:12px;color:var(--text2);margin-left:8px;"></span>
        </div>
        <div class="panel-actions">
          <button class="btn primary" id="btnRun" onclick="startRun()">Start Run</button>
          <button class="btn" id="btnContinue" onclick="continueRun()" style="display:none;">Continue</button>
          <button class="btn" id="btnStop" onclick="stopRun()" style="display:none;">Stop</button>
          <button class="btn" id="btnResume" onclick="resumeThread()" style="display:none;">Resume</button>
          <button class="btn danger" id="btnDelete" onclick="deleteThread()">Delete</button>
        </div>
      </div>
      <div class="log-area" id="logArea"></div>
      <div class="input-bar">
        <input type="text" id="injectInput" placeholder="Send message to running thread..." onkeydown="if(event.key==='Enter')injectMessage()">
        <button class="btn" onclick="injectMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Create Thread Modal -->
<div class="modal-overlay hidden" id="createModal" onclick="if(event.target===this)hideCreateModal()">
  <div class="modal">
    <h3>Create Thread</h3>
    <label>Name</label>
    <input type="text" id="newName" placeholder="e.g. code-reviewer">
    <label>Type</label>
    <select id="newType"><option value="observer">Observer (read-only)</option><option value="actor">Actor (can mutate)</option></select>
    <label>System Prompt</label>
    <textarea id="newPrompt" placeholder="You are a..."></textarea>
    <label>Tools (comma-separated)</label>
    <input type="text" id="newTools" value="Read, Glob, Grep" placeholder="Read, Glob, Grep, Bash">
    <label>Working Directory</label>
    <input type="text" id="newCwd" placeholder="/path/to/project">
    <label>Model (optional)</label>
    <input type="text" id="newModel" placeholder="claude-sonnet-4-20250514">
    <label>Docker Image (optional, default: ubuntu:22.04)</label>
    <input type="text" id="newDockerImage" placeholder="ubuntu:22.04">
    <div class="modal-actions">
      <button class="btn" onclick="hideCreateModal()">Cancel</button>
      <button class="btn primary" onclick="createThread()">Create</button>
    </div>
  </div>
</div>

<script>
const API = '';
let threads = [];
let selectedId = null;
let sse = null;

// ── API calls ──

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  return res.json();
}

async function loadThreads() {
  threads = await api('/api/threads');
  renderThreadList();
  if (selectedId) {
    const t = threads.find(t => t.id === selectedId);
    if (t) renderPanel(t);
  }
}

// ── Render ──

function renderThreadList() {
  const el = document.getElementById('threadList');
  el.innerHTML = threads.map(t => `
    <div class="thread-item ${t.id === selectedId ? 'active' : ''}" onclick="selectThread('${t.id}')">
      <div class="name">${esc(t.name)} <span class="status ${t.status}">${t.status}</span></div>
      <div class="meta">${t.type} &middot; ${t.tools.join(', ')}</div>
    </div>
  `).join('');
}

function renderPanel(t) {
  document.getElementById('emptyState').classList.add('hidden');
  const panel = document.getElementById('threadPanel');
  panel.classList.remove('hidden');
  panel.style.display = 'flex';

  document.getElementById('panelTitle').textContent = t.name;
  const statusEl = document.getElementById('panelStatus');
  statusEl.textContent = t.status;
  statusEl.className = 'status ' + t.status;
  document.getElementById('panelMeta').textContent = `${t.type} | ${t.model}`;

  const isRunning = t.status === 'running';
  const isPaused = t.status === 'paused';
  const isStopped = !isRunning && !isPaused;
  const hasHistory = document.getElementById('logArea').children.length > 0;
  document.getElementById('btnRun').style.display = isStopped ? '' : 'none';
  document.getElementById('btnContinue').style.display = (isStopped && hasHistory) ? '' : 'none';
  document.getElementById('btnStop').style.display = isRunning ? '' : 'none';
  document.getElementById('btnResume').style.display = isPaused ? '' : 'none';
}

let streamDiv = null; // live streaming text accumulator

function appendLog(entry) {
  if (entry.level === 'debug') return;

  // Finalize any open streaming div before adding a log entry
  finalizeStream();

  const area = document.getElementById('logArea');
  const div = document.createElement('div');
  div.className = 'log-entry ' + (entry.level || 'info');
  const ts = entry.createdAt ? new Date(entry.createdAt).toLocaleTimeString() :
             entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : '';
  div.innerHTML = `<span class="ts">${ts}</span><span class="ev">${esc(entry.event || entry.type || '')}</span>${esc(entry.message || '')}`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function appendStreamText(text) {
  const area = document.getElementById('logArea');
  if (!streamDiv) {
    streamDiv = document.createElement('div');
    streamDiv.className = 'llm-stream';
    area.appendChild(streamDiv);
  }
  streamDiv.textContent += text;
  area.scrollTop = area.scrollHeight;
}

function finalizeStream() {
  if (streamDiv) {
    streamDiv.classList.add('done');
    streamDiv = null;
  }
}

function appendAssistantBlock(text, timestamp) {
  const area = document.getElementById('logArea');
  const div = document.createElement('div');
  div.className = 'llm-stream done';
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

// ── Actions ──

function selectThread(id) {
  selectedId = id;
  const t = threads.find(t => t.id === id);
  if (!t) return;
  renderThreadList();
  renderPanel(t);
  document.getElementById('logArea').innerHTML = '';
  streamDiv = null;
  connectSSE(id);
}

function connectSSE(threadId) {
  if (sse) sse.close();
  sse = new EventSource(`/api/threads/${threadId}/stream`);
  sse.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'init') {
      // Initial thread state — update panel
      if (data.thread) {
        const t = threads.find(t => t.id === data.thread.id);
        if (t) Object.assign(t, data.thread);
        renderPanel(data.thread);
        renderThreadList();
      }
      return;
    }

    if (data.type === 'history') {
      // Historical logs sent on connect (already in chronological order after reverse)
      data.logs.reverse().forEach(l => appendLog(l));
      return;
    }

    if (data.type === 'messages') {
      // Conversation messages from the latest session — restore on reload
      (data.messages || []).forEach(m => {
        if (m.role === 'assistant') {
          let text = m.content;
          try {
            const blocks = JSON.parse(text);
            if (Array.isArray(blocks)) {
              text = blocks
                .filter(b => b.type === 'text')
                .map(b => b.text)
                .join('\n');
            }
          } catch {}
          if (text) appendAssistantBlock(text, m.createdAt);
        }
      });
      return;
    }

    // Streaming text tokens — accumulate into live div
    if (data.type === 'llm_text') {
      appendStreamText(data.text);
      return;
    }

    // Regular log events
    if (data.type === 'log') {
      appendLog(data);
      return;
    }

    // Thread status change
    if (data.type === 'thread_status') {
      const t = threads.find(t => t.id === selectedId);
      if (t) { t.status = data.status; renderPanel(t); renderThreadList(); }
      return;
    }

    // Thread paused
    if (data.type === 'thread_paused') {
      appendLog({ level: 'warn', event: 'paused', message: data.reason, timestamp: data.timestamp });
      const t = threads.find(t => t.id === selectedId);
      if (t) { t.status = 'paused'; renderPanel(t); renderThreadList(); }
      return;
    }

    // Run complete
    if (data.type === 'run_complete') {
      finalizeStream();
      appendLog({ level: 'info', event: 'run.complete', message: data.summary || 'Run finished', timestamp: data.timestamp });
      loadThreads();
      return;
    }

    // Thread error
    if (data.type === 'thread_error') {
      appendLog({ level: 'error', event: 'error', message: data.error, timestamp: data.timestamp });
      const t = threads.find(t => t.id === selectedId);
      if (t) { t.status = 'error'; renderPanel(t); renderThreadList(); }
      return;
    }
  };

  sse.onerror = () => {
    // EventSource auto-reconnects; just log it
    console.warn('SSE connection error, will retry...');
  };
}

async function startRun() {
  if (!selectedId) return;
  await api(`/api/threads/${selectedId}/run`, { method: 'POST', body: { trigger: 'manual' } });
  await loadThreads();
}

async function continueRun() {
  if (!selectedId) return;
  const input = document.getElementById('injectInput').value.trim() || undefined;
  await api(`/api/threads/${selectedId}/run`, { method: 'POST', body: { trigger: 'manual', continueSession: true, input } });
  document.getElementById('injectInput').value = '';
  await loadThreads();
}

async function stopRun() {
  if (!selectedId) return;
  await api(`/api/threads/${selectedId}/run`, { method: 'DELETE' });
  await loadThreads();
}

async function resumeThread() {
  if (!selectedId) return;
  const msg = document.getElementById('injectInput').value.trim();
  await api(`/api/threads/${selectedId}/resume`, { method: 'POST', body: { message: msg || undefined } });
  document.getElementById('injectInput').value = '';
  await loadThreads();
}

async function injectMessage() {
  if (!selectedId) return;
  const input = document.getElementById('injectInput');
  const msg = input.value.trim();
  if (!msg) return;
  await api(`/api/threads/${selectedId}/inject`, { method: 'POST', body: { message: msg } });
  input.value = '';
  appendLog({ level: 'info', event: 'user.inject', message: msg, timestamp: new Date().toISOString() });
}

async function deleteThread() {
  if (!selectedId) return;
  if (!confirm('Delete this thread?')) return;
  await api(`/api/threads/${selectedId}`, { method: 'DELETE' });
  selectedId = null;
  document.getElementById('threadPanel').classList.add('hidden');
  document.getElementById('threadPanel').style.display = '';
  document.getElementById('emptyState').classList.remove('hidden');
  if (sse) sse.close();
  await loadThreads();
}

// ── Create modal ──

function showCreateModal() {
  document.getElementById('createModal').classList.remove('hidden');
  document.getElementById('newName').focus();
}

function hideCreateModal() {
  document.getElementById('createModal').classList.add('hidden');
}

async function createThread() {
  const name = document.getElementById('newName').value.trim();
  const type = document.getElementById('newType').value;
  const systemPrompt = document.getElementById('newPrompt').value.trim();
  const tools = document.getElementById('newTools').value.split(',').map(s => s.trim()).filter(Boolean);
  const cwd = document.getElementById('newCwd').value.trim() || undefined;
  const model = document.getElementById('newModel').value.trim() || undefined;
  const dockerImage = document.getElementById('newDockerImage').value.trim() || undefined;

  if (!name || !systemPrompt) { alert('Name and system prompt are required'); return; }

  const result = await api('/api/threads', {
    method: 'POST',
    body: { name, type, systemPrompt, tools, cwd, model, dockerImage },
  });

  if (result.error) { alert(result.error); return; }

  hideCreateModal();
  await loadThreads();
  selectThread(result.id);
}

// ── Util ──

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Init ──

loadThreads();
setInterval(loadThreads, 10000);
</script>
</body>
</html>
